<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="24" fill="#0f172a"/>

  <!-- Scales of Justice -->
  <!-- Central beam -->
  <rect x="88" y="70" width="16" height="52" rx="2" fill="#f59e0b"/>

  <!-- Left scale pan -->
  <ellipse cx="68" cy="110" rx="16" ry="12" fill="#64748b"/>
  <rect x="60" y="98" width="16" height="4" rx="2" fill="#475569"/>
  <ellipse cx="68" cy="106" rx="12" ry="8" fill="#f1f5f9"/>
  <text x="68" y="112" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="8" font-weight="bold">L</text>

  <!-- Right scale pan -->
  <ellipse cx="124" cy="110" rx="16" ry="12" fill="#64748b"/>
  <rect x="116" y="98" width="16" height="4" rx="2" fill="#475569"/>
  <ellipse cx="124" cy="106" rx="12" ry="8" fill="#f1f5f9"/>
  <text x="124" y="112" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="8" font-weight="bold">R</text>

  <!-- Balance point -->
  <circle cx="96" cy="70" r="4" fill="#f59e0b"/>
  <circle cx="96" cy="70" r="2" fill="#0f172a"/>

  <!-- Support base -->
  <rect x="84" y="120" width="24" height="6" rx="3" fill="#475569"/>
  <rect x="92" y="126" width="8" height="20" rx="4" fill="#64748b"/>

  <!-- App name -->
  <text x="96" y="170" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="12" font-weight="bold">NJI</text>
</svg>